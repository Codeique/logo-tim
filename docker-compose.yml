version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: logotim-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: logotim
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - logotim-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logotim-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@db:5432/logotim
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      INTERNAL_ONLY: "false"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node_modules/.bin/prisma migrate deploy && node dist/index.js"
    networks:
      - logotim-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logotim-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - logotim-net

networks:
  logotim-net:
    driver: bridge

volumes:
  pgdata:

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-at-least-32-chars-long
          JWT_REFRESH_SECRET: test-refresh-at-least-32-chars-long
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/logotim_test

      - name: Build
        run: npm run build
